name: Build and deploy Node.js app to Azure Web App - gdprapi

on:
  push:
    branches:
      - copilot/enhance-ui-ux-login-dashboard
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build (if present)
        run: npm run build --if-present

      - name: Test (if present)
        run: npm test --if-present

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'gdprapi'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_GDPRAPI }}
          package: .
