<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>IoT GDPR Healthcare</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <h1>IoT GDPR Healthcare Dashboard</h1>

    <section id="loginSection" class="card">
      <h2>Login</h2>
      <form id="loginForm">
        <label>Email <input id="email" type="email" required /></label>
        <label>Password <input id="password" type="password" minlength="6" required /></label>
        <button type="submit">Login</button>
      </form>
      <p class="hint">Default admin email: 22004249@st.vlute.edu.vn</p>
    </section>

    <section id="dashboardSection" class="card hidden">
      <h2>Dashboard</h2>
      <p id="meInfo"></p>

      <div class="row">
        <button id="loadSummaryBtn">Load Daily Summary</button>
        <button id="logoutBtn">Logout</button>
      </div>

      <pre id="summaryOutput"></pre>

      <div id="adminControls" class="hidden">
        <h3>Admin Actions</h3>
        <button id="listUsersBtn">List Users</button>
        <button id="sendDailyEmailsBtn">Send Daily Emails</button>
        <pre id="adminOutput"></pre>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
